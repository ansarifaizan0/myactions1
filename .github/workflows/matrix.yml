name: Matrix Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-20.04,windows-latest] 
        images: [hello-world,alpine]  
        exclude:
          - images: alpine
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: echo docker details
        run: docker info

      - name: run images on ${{ matrix.os }}
        run: docker run ${{ matrix.images }}