name: My-workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4

      - name: Listing files and reading files
        run: |
          ls -lart
          [ -f README.md ] && cat README.md || echo "No README found"
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Validate password
        run: |
            if [ "$PASSWORD" = "Uansari@786" ]; then
            echo "Correct password"
            fi
        env:
            PASSWORD: ${{ secrets.PASSWORD }}