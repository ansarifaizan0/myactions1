name: My-workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4

      - name: Listing files and reading files
        run: |
          ls -lart
          cat README.md

      - name: Event type
        run:  "This workflow is triggered by: ${{ github.event_name }}"

      - name: Running through Shell script
        if: github.actor == 'ansarifaizan12'
        run: |
          chmod +x ascii.sh
          ./ascii.sh
        env:
          PASSWORD: ${{ secrets.PASSWORD }}
          GITHUB_CONTEXT: ${{ toJson(github) }}